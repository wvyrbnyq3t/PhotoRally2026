<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>案内イベント | 新入生歓迎祭2026</title>
    <!-- StyleSheets -->
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utilities.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Google Material Design -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <div class="l-page">
      <div class="l-page__inner">
        <div class="l-modal" id="modal">
          <div class="l-modal__overlay"></div>
          <div class="l-modal__inner">
            <div class="stampCard">
              <div class="stampCard__inner">
                <p class="stampCard__title">スタンプカード</p>
                <div class="stampCard__content">
                  <span class="stamp is-active">1</span>
                  <span class="stamp">2</span>
                  <span class="stamp">3</span>
                  <span class="stamp">4</span>
                  <span class="stamp">5</span>
                  <span class="stamp">6</span>
                </div>
                <button
                  type="button"
                  class="c-button c-button--secondary u-width--full"
                  id="closeModal"
                >
                  <span class="c-button__label">閉じる</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <main class="l-page-content">
          <div class="l-page-content__inner">
            <img src="./images/spots/03/01.jpg" alt="" />
            <div class="l-section">
              <div class="l-section__inner">
                <p>フォトスポット　No.2</p>
                <h2>時計モニュメント</h2>
                <p>
                  法政カラーのオレンジと紺色が基調の時計モニュメント。正門からすぐ見える場所、西館と中央館の間に！
                </p>
              </div>
            </div>
            <div class="l-section">
              <div class="l-section__inner">
                <h2>キャンパスマップ</h2>
                <img src="./images/map/map2.png" alt="" />
              </div>
            </div>
          </div>
        </main>
        <footer class="l-page-footer">
          <div class="l-page-footer__inner">
            <div class="l-grid--2">
              <button
                type="button"
                class="c-button--secondary c-button u-width--full"
                id="openModal"
              >
                <span class="c-button__label">スタンプカード</span>
              </button>
              <a
                href="./03.html"
                class="c-button--primary c-button u-width--full"
              >
                <span class="c-icon c-button__icon">photo_camera</span>
                <span class="c-button__label">撮影完了！</span>
              </a>
            </div>
          </div>
        </footer>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const entryFlg = localStorage.getItem("entryFlg");
      const modal = document.getElementById("modal");
      const openModal = document.getElementById("openModal");
      const closeModal = document.getElementById("closeModal");

      openModal.addEventListener("click", () => {
        modal.classList.add("is-active");
      });
      closeModal.addEventListener("click", () => {
        modal.classList.remove("is-active");
      });

      if (!entryFlg) {
        window.location.href = "entry.html";
      }
    </script>
  </body>
</html>
